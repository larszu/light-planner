name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4e9702d5a75cbb4d7acb4e5fb5cf6a8b8d3aa5f2

      - uses: actions/setup-node@49933ea5288caeca8642195f2ed94ec4c75d956a
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test
