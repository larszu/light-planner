name: Release build

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

env:
  # Opt the bundled actions into Node 24 to silence the Node 20 deprecation
  # notice (deadline 2026-06-02). Drop this once checkout/setup-node ship v5.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --omit=dev || true

      - name: Set version from tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Building version $VERSION from tag $TAG"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No paid signing certificate available. The macOS config requests an
          # ad-hoc signature ("identity": "-") so Apple Silicon Gatekeeper
          # accepts the binary instead of rejecting it with "Light Planner is
          # damaged and can't be opened". We deliberately do NOT set
          # CSC_IDENTITY_AUTO_DISCOVERY=false here: in electron-builder 26 that
          # flag short-circuits the explicit ad-hoc identity and falls back to a
          # fully-unsigned binary, which arm64 macOS refuses to launch.
        run: npm run ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.zip
            release/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Light Planner ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.exe
            artifacts/*.zip
            artifacts/*.dmg
